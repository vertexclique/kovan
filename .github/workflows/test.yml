name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-feature=+cmpxchg16b"

jobs:
  test:
    name: Test stable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace --release

  test-nightly:
    name: Test nightly (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Build (nightly)
        run: cargo build --workspace --features nightly

      - name: Run tests (nightly)
        run: cargo test --workspace --release --features nightly

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          RUSTFLAGS: "-C target-feature=+cmpxchg16b"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  shuttle:
    name: Shuttle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # One model-checked scenario per crate (kovan-channel covers three).
      # Each opts in via its own `shuttle` feature, kept off by default so
      # it costs nothing outside this job. Release mode: shuttle's own
      # scheduling overhead dwarfs the workload either way, but release
      # keeps the per-iteration cost (and so the total run) down.
      - name: Run shuttle tests
        run: |
          cargo test -p kovan --features shuttle --test shuttle_reclaim --release
          cargo test -p kovan-map --features shuttle --test shuttle_resize --release
          cargo test -p kovan-channel --features shuttle --test shuttle_channel --release
          cargo test -p kovan-queue --features shuttle --test shuttle_array_queue --release
          cargo test -p kovan-stm --features shuttle --test shuttle_stm --release
          cargo test -p kovan-mvcc --features shuttle --test shuttle_lock_table --release
